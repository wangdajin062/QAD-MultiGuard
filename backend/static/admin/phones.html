<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诈骗号码库 &mdash; QAD-MultiGuard 管理看板</title>
<link rel="stylesheet" href="/static/admin/css/admin.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">&Sigma;</div>
    <div class="brand-text">QAD-MultiGuard<small>v5.0 管理看板</small></div>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin/dashboard"><span class="nav-icon">&#9783;</span><span>数据仪表盘</span></a>
    <a href="/admin/reports"><span class="nav-icon">&#9997;</span><span>举报审核</span></a>
    <a href="/admin/cases"><span class="nav-icon">&#128214;</span><span>案例管理</span></a>
    <a href="/admin/alerts"><span class="nav-icon">&#9888;</span><span>预警发布</span></a>
    <a href="/admin/keywords"><span class="nav-icon">&#128272;</span><span>关键词管理</span></a>
    <a href="/admin/phones" class="active"><span class="nav-icon">&#9742;</span><span>诈骗号码库</span></a>
  </nav>
  <div class="sidebar-user">
    <div class="avatar">A</div>
    <div class="user-info"><div class="name">管理员</div><div class="role">超级管理员</div></div>
    <div class="logout" title="登出">&#9211;</div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <h1>诈骗号码库</h1>
      <div class="subtitle">已确认的诈骗电话号码数据库</div>
    </div>
    <div>
      <select id="riskFilter" class="form-control" style="width:130px;" onchange="loadPhones(1)">
        <option value="">全部等级</option>
        <option value="high">高危</option>
        <option value="medium">中危</option>
        <option value="safe">安全</option>
      </select>
    </div>
  </div>
  <div class="card">
    <div class="table-container" id="phonesTable"></div>
    <div id="pagination" class="pagination"></div>
  </div>
</main>

<script src="/static/admin/js/admin.js"></script>
<script>
async function loadPhones(page = 1) {
  await checkAuth();
  try {
    const risk = document.getElementById('riskFilter').value;
    let url = V1 + '/fraud-phones?page=' + page;
    if (risk) url += '&risk_level=' + risk;
    const data = await apiGet(url);
    renderPhones(data);
  } catch (e) { showToast('加载失败: ' + e.message, 'error'); }
}

function renderPhones(data) {
  const items = data.data || data.items || [];
  if (!items.length) {
    document.getElementById('phonesTable').innerHTML = '<div class="empty-state"><div class="empty-icon">&#128196;</div><p>暂无记录</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const rows = items.map(p => `
    <tr>
      <td style="color:var(--text-muted);font-family:'Fira Code',monospace;">${p.id}</td>
      <td style="font-family:'Fira Code',monospace;">${p.phone_number || '-'}</td>
      <td>${riskBadge(p.risk_level)}</td>
      <td>${p.risk_type || '-'}</td>
      <td style="font-family:'Fira Code',monospace;">${p.risk_score || 0}</td>
      <td style="font-family:'Fira Code',monospace;">${p.report_count || 0}</td>
      <td style="font-family:'Fira Code',monospace;">${p.confirmed_count || 0}</td>
      <td>${p.is_verified ? '<span style="color:var(--success);">已验证</span>' : '<span style="color:var(--text-muted);">待验证</span>'}</td>
      <td style="font-family:'Fira Code',monospace;font-size:12px;">${fmtTime(p.last_reported_at)}</td>
      <td style="white-space:nowrap;">
        ${!p.is_verified ? `<button class="btn btn-sm btn-success" onclick="verifyPhone(${p.id})">验证</button>` : '-'}
      </td>
    </tr>
  `).join('');
  document.getElementById('phonesTable').innerHTML = `
    <table>
      <thead><tr><th>ID</th><th>号码</th><th>风险</th><th>类型</th><th>分数</th><th>举报</th><th>确认</th><th>验证</th><th>最近举报</th><th>操作</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  renderPagination(document.getElementById('pagination'), data.meta || data, loadPhones);
}

function verifyPhone(id) {
  showModal('人工验证', '<p>确认将此号码标记为已验证？验证后风险等级将提升为高危。</p>', async () => {
    try {
      await apiPost(V1 + '/fraud-phones/' + id + '/verify');
      showToast('已验证', 'success');
      loadPhones();
    } catch (e) { showToast(e.message, 'error'); }
  }, '确认验证');
}

loadPhones();
</script>
</body>
</html>
