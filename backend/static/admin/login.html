<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理登录 &mdash; QAD-MultiGuard v5.0</title>
<link rel="stylesheet" href="/static/admin/css/admin.css">
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-logo">&#9729;</div>
  <h2>QAD-MultiGuard</h2>
  <p class="subtitle">校园安全 v5.0 &middot; 软硬协同多模态检测</p>

  <div class="form-group">
    <label for="phone">手机号</label>
    <input type="tel" id="phone" class="form-control" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
  </div>

  <div class="form-group code-row">
    <div>
      <label for="code">验证码</label>
      <input type="text" id="code" class="form-control" placeholder="6位验证码" maxlength="6" autocomplete="one-time-code">
    </div>
    <div style="display:flex;align-items:flex-end;">
      <button id="sendCodeBtn" class="btn btn-outline" onclick="sendCode()" style="min-width:110px;">发送验证码</button>
    </div>
  </div>

  <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:4px;">登 录</button>

  <div class="dev-hint">
    开发模式：万能验证码 <code>888888</code>
  </div>
</div>

<script src="/static/admin/js/admin.js"></script>
<script>
let countdown = 0;

function sendCode() {
  const phone = document.getElementById('phone').value;
  if (!/^1[3-9]\d{9}$/.test(phone)) {
    showToast('请输入正确的手机号', 'error');
    return;
  }
  if (countdown > 0) return;

  fetch('/v1/auth/send-code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone }),
  })
  .then(r => { if (!r.ok) throw new Error('发送失败'); return r.json(); })
  .then(() => {
    showToast('验证码已发送（开发模式查看服务器日志）', 'success');
    countdown = 60;
    updateCountdown();
  })
  .catch(e => showToast(e.message, 'error'));
}

function updateCountdown() {
  const btn = document.getElementById('sendCodeBtn');
  if (countdown > 0) {
    btn.textContent = countdown + 's';
    btn.disabled = true;
    countdown--;
    setTimeout(updateCountdown, 1000);
  } else {
    btn.textContent = '发送验证码';
    btn.disabled = false;
  }
}

function doLogin() {
  const phone = document.getElementById('phone').value;
  const code = document.getElementById('code').value;
  if (!phone || !code) {
    showToast('请填写手机号和验证码', 'error');
    return;
  }

  fetch('/admin/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ phone, code }),
  })
  .then(r => r.json())
  .then(data => {
    if (!data || data.detail) throw new Error(data?.detail || '登录失败');
    showToast('登录成功，正在跳转...', 'success');
    setTimeout(() => { location.href = '/admin/dashboard'; }, 500);
  })
  .catch(e => showToast(e.message, 'error'));
}

document.getElementById('phone').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('code').focus();
});
document.getElementById('code').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
