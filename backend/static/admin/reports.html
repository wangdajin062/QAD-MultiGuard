<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>举报审核 &mdash; QAD-MultiGuard 管理看板</title>
<link rel="stylesheet" href="/static/admin/css/admin.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">&Sigma;</div>
    <div class="brand-text">QAD-MultiGuard<small>v5.0 管理看板</small></div>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin/dashboard"><span class="nav-icon">&#9783;</span><span>数据仪表盘</span></a>
    <a href="/admin/reports" class="active"><span class="nav-icon">&#9997;</span><span>举报审核</span></a>
    <a href="/admin/cases"><span class="nav-icon">&#128214;</span><span>案例管理</span></a>
    <a href="/admin/alerts"><span class="nav-icon">&#9888;</span><span>预警发布</span></a>
    <a href="/admin/keywords"><span class="nav-icon">&#128272;</span><span>关键词管理</span></a>
    <a href="/admin/phones"><span class="nav-icon">&#9742;</span><span>诈骗号码库</span></a>
  </nav>
  <div class="sidebar-user">
    <div class="avatar">A</div>
    <div class="user-info"><div class="name">管理员</div><div class="role">超级管理员</div></div>
    <div class="logout" title="登出">&#9211;</div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <h1>举报审核</h1>
      <div class="subtitle">审核和管理用户提交的诈骗举报</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-status="pending">待审核</div>
    <div class="tab" data-status="approved">已通过</div>
    <div class="tab" data-status="rejected">已拒绝</div>
    <div class="tab" data-status="all">全部</div>
  </div>
  <div class="card">
    <div class="table-container" id="reportsTable"></div>
    <div id="pagination" class="pagination"></div>
  </div>
</main>

<script src="/static/admin/js/admin.js"></script>
<script>
let currentStatus = 'pending';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentStatus = tab.dataset.status;
    loadReports(1);
  });
});

async function loadReports(page = 1) {
  await checkAuth();
  try {
    let url = V1 + '/reports?page=' + page;
    if (currentStatus !== 'all') url += '&status=' + currentStatus;
    const data = await apiGet(url);
    renderReports(data);
  } catch (e) {
    showToast('加载失败: ' + e.message, 'error');
  }
}

function renderReports(data) {
  const items = data.data || data.items || [];
  if (!items.length) {
    document.getElementById('reportsTable').innerHTML = '<div class="empty-state"><div class="empty-icon">&#128196;</div><p>暂无数据</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const rows = items.map(r => `
    <tr>
      <td style="color:var(--text-muted);font-family:'Fira Code',monospace;">${r.id}</td>
      <td>${statusBadge(r.report_type)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.target || ''}">${(r.target || '').substring(0, 30)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(r.description || '').substring(0, 40)}</td>
      <td>${statusBadge(r.status)}</td>
      <td style="font-family:'Fira Code',monospace;font-size:12px;">${fmtTime(r.created_at)}</td>
      <td style="white-space:nowrap;">
        ${r.status === 'pending' ? `
          <button class="btn btn-sm btn-success" onclick="approveReport(${r.id})">通过</button>
          <button class="btn btn-sm btn-ghost" onclick="rejectReport(${r.id})">拒绝</button>
        ` : r.review_note || '-'}
      </td>
    </tr>
  `).join('');
  document.getElementById('reportsTable').innerHTML = `
    <table>
      <thead><tr><th>ID</th><th>类型</th><th>目标</th><th>描述</th><th>状态</th><th>提交时间</th><th>操作</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  renderPagination(document.getElementById('pagination'), data.meta || data, loadReports);
}

function approveReport(id) {
  showModal('审核通过', `
    <div class="form-group"><label>风险类型</label>
      <select id="riskType" class="form-control">
        <option value="电信诈骗">电信诈骗</option><option value="骚扰电话">骚扰电话</option>
        <option value="钓鱼链接">钓鱼链接</option><option value="恶意短信">恶意短信</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-group"><label>审核备注</label>
      <input id="note" class="form-control" placeholder="可选">
    </div>
  `, async (overlay) => {
    try {
      await apiPost(V1 + '/reports/' + id + '/approve', {
        note: overlay.querySelector('#note').value,
        risk_type: overlay.querySelector('#riskType').value,
      });
      showToast('已通过', 'success');
      loadReports(1);
    } catch (e) { showToast(e.message, 'error'); }
  }, '确认通过');
}

function rejectReport(id) {
  showModal('拒绝举报', `
    <div class="form-group"><label>拒绝原因</label>
      <input id="note" class="form-control" placeholder="可选">
    </div>
  `, async (overlay) => {
    try {
      await apiPost(V1 + '/reports/' + id + '/reject', { note: overlay.querySelector('#note').value });
      showToast('已拒绝', 'info');
      loadReports(1);
    } catch (e) { showToast(e.message, 'error'); }
  }, '确认拒绝');
}

loadReports();
</script>
</body>
</html>
